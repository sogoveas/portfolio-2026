<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patterns Simplified</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #F5F1E8;
  --ink: #1A1410;
  --rust: #C4471A;
  --warm-mid: #8C6A4E;
}

html, body {
  height: 100%;
}

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);

  display: flex;
  flex-direction: column;
}

.page-content {
  flex: 1;
}

.back {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: .8rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--ink);
}

.header {
  padding: 50px 48px 20px;
  border-bottom: 1px solid rgba(0,0,0,0.1);
}

.header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(3rem,5vw,5rem);
  margin: 0 0 6px 0;
}

.header p {
  max-width: 600px;
  color: var(--warm-mid);
  line-height: 1.7;
  font-weight: 300;
  margin: 0;
}

.single-image {
  display: flex;
  justify-content: center;
}

.single-image img {
  max-height: 35vh;
  object-fit: contain;
  transform-origin: center;
  display: block;
}

footer {
  background: var(--ink);
  padding: 32px 48px;
  display: flex;
  align-items: center;
}

footer span {
  font-size: 0.8rem;
  color: rgba(245,241,232,0.3);
}

</style>
</head>

<body>

<div class="page-content">

  <a href="index.html" class="back">← Back</a>

  <div class="header">
    <h1>Patterns<br><em>Simplified</em></h1>
    <p>
      A series of geometric reinterpretations of traditional Indian textile borders. 
      Inspired by zari embroidery and block-printed saris, each pattern distills ornament into rhythm, symmetry, and restraint.
    </p>
  </div>

  <br> <br> 

  <div class="single-image">
    <img src="images/patterns-simplified/pattern.png" alt="Pattern Simplified">
  </div>

</div>

<footer>
  <span>© 2026 Sonia Goveas</span>
</footer>

</body>
</html>
